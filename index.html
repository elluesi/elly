<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elly Fleschutz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #eef4f8;
  --text: #1f1f1f;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

.container {
  width: min(1000px, 90%);
  margin: 0 auto;
}

/* Navigation */

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 32px 0;
}

.logo {
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.menu {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.menu a {
  text-decoration: none;
  color: var(--text);
  font-size: 0.95rem;
}

.menu a:hover {
  opacity: 0.7;
}

/* Leerer Platz für spätere Inhalte */

.spacer {
  min-height: 75vh;
}

/* Kontakt */

section {
  padding: 120px 0;
}

h2 {
  font-family: 'Inter', sans-serif;
  font-size: 1.4rem;
  font-weight: 500;
  margin-bottom: 32px;
}

.socials {
  display: flex;
  gap: 28px;
  align-items: center;
  font-size: 1.8rem;
}

.socials a {
  text-decoration: none;
  color: var(--text);
  opacity: 0.8;
  transition: opacity 0.2s ease;
}

.socials a:hover {
  opacity: 1;
}

/* Mobile */

@media (max-width: 700px) {

  nav {
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  .menu {
    gap: 16px;
  }

  .spacer {
    min-height: 60vh;
  }

}

</style>
</head>

<body>

<div class="container">

<nav>

  <div class="logo">
    ELLY FLESCHUTZ
  </div>

  <div class="menu">

      Artikel lesen
    </a>

    <a href="#kontakt">

    </a>

  </div>

  </div>

</section>

</div>

</body>
