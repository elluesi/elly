<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elly Fleschutz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

  * {
  font-family: 'Inter', sans-serif !important;
}
  
:root{
  --bg:#ADD8E6;
  --text:#202020;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

.container{
  width:min(900px,90%);
  margin:0 auto;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:32px 0;
}

.logo{
  font-size:.9rem;
  letter-spacing:.15em;
  text-transform:uppercase;
}

  a {
  color: #000000;
  text-decoration: none;
}

a:visited {
  color: #000000;
}

a:hover {
  color: #000000;
}
  
.menu a{
  text-decoration:none;
  color:var(--text);
  font-size:.95rem;
}

.menu a:hover{
  opacity:.7;
}

.contact-line{ 
  display:flex; align-items:center; gap:40px; margin-top:20px; font-size:.9rem; 
} 

.contact-label{ 
 letter-spacing:.15em; text-transform:uppercase; 
}
 
.contact-line a{ color:#000; text-decoration:none; 
} 
 
.contact-line a: hover{ 
 opacity:.6;
}

.contact h2{
  font-size:1rem;
  font-weight:500;
  margin-bottom:18px;
}

.icons{
  display:flex;
  gap:60px;
  align-items:center;
}

.icons img{
  width:32px;
  height:32px;
  image-rendering:auto;
  transition:transform .15s ease;
}

.icons img:hover{
  transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="container">

<nav>

  <div class="logo">
    ELLY FLESCHUTZ
  </div>

  <div class="menu">
    <a href="https://www.torial.com/elisabeth.fleschutz" target="_blank">
      artikel
    </a>
  </div>

</nav>

<section id="kontakt"> 
 
 <div class="contact-line"> 
  <span class="contact-label">KONTAKT</span> 
  <a href="mailto:ellyfleschutz@web.de">e-Mail</a> 
  <a href="https://instagram.com/ellyfleschutz" target="_blank"> instagram </a> 
 
 </div> </section>

</div>

</body>
</html>
