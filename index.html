<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elly Fleschutz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #f8f6f1;
  --text: #1f1f1f;
  --muted: #6f6f6f;
  --line: #d8d4ce;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.8;
}

.container {
  width: min(1000px, 90%);
  margin: 0 auto;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 32px 0;
}

.logo {
  font-size: 0.9rem;
  letter-spacing: 0.15em;
}

.menu {
  display: flex;
  gap: 24px;
}

.menu a {
  text-decoration: none;
  color: var(--text);
}

.hero {
  min-height: 70vh;
  display: flex;
  align-items: center;
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 9vw, 7rem);
  font-weight: 500;
  line-height: 0.95;
  margin: 0;
}

.hero p {
  max-width: 550px;
  margin-top: 24px;
  color: var(--muted);
  font-size: 1.1rem;
}

section {
  padding: 100px 0;
  border-top: 1px solid var(--line);
}

h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.5rem;
  font-weight: 500;
  margin-bottom: 40px;
}

.grid {
  display: grid;
  gap: 30px;
}

.card {
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}

.card h3 {
  margin-bottom: 8px;
}

.meta {
  color: var(--muted);
  font-size: 0.9rem;
}

a {
  color: inherit;
}

.about {
  max-width: 700px;
}

footer {
  padding: 80px 0;
  border-top: 1px solid var(--line);
}

.socials {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.socials a {
  text-decoration: none;
}

.hero-image {
  margin-top: 40px;
  width: 100%;
  height: 60vh;
  object-fit: cover;
  border-radius: 2px;
}

@media (max-width: 700px) {

  .menu {
    gap: 12px;
    font-size: 0.9rem;
  }

  .hero {
    min-height: auto;
    padding: 40px 0 80px;
  }

}
</style>
</head>

<body>

<div class="container">

<nav>
  <div class="logo">ELLY FLESCHUTZ</div>

  <div class="menu">
    <a href="#arbeiten">Arbeiten</a>
    <a href="#projekte">Projekte</a>
    <a href="#ueber">Über</a>
    <a href="#kontakt">Kontakt</a>
  </div>
</nav>

<section class="hero">

<div>


<a href="mailto:ellyfleschutz@web.de">
E-Mail
</a>


<a href="https://www.instagram.com/ellyfleschutz/">
Instagram
</a>

</div>

</footer>

</div>

</body>
</html>
