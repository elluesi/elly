<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elly Fleschutz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #f8f6f1;
  --text: #1f1f1f;
  --muted: #6f6f6f;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

/* Layout container */
.container {
  width: min(1000px, 90%);
  margin: 0 auto;
}

/* NAVIGATION */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 32px 0;
}

.logo {
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  font-weight: 300;
  text-transform: uppercase;
}

.menu {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.menu a {
  text-decoration: none;
  color: var(--text);
  font-size: 0.95rem;
}

/* Kontakt */
section {
  padding: 120px 0;
}

h2 {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 2.2rem;
  margin-bottom: 40px;
}

/* Social links */
.socials {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  font-family: 'Inter', sans-serif;
  font-size: 1.2rem;
}

.socials a {
  text-decoration: none;
  color: var(--text);
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
}

.socials a:hover {
  border-bottom: 1px solid var(--text);
}

/* Mobile */
@media (max-width: 700px) {

  nav {
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  .menu {
    gap: 16px;
  }

  .socials {
    gap: 20px;
  }
}

</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<nav>
  <div class="logo">ELLY FLESCHUTZ</div>

  <div class="menu">
    <a href="#arbeiten">Arbeiten</a>
    <a href="#projekte">Projekte</a>
    <a href="#ueber">Über</a>
    <a href="#kontakt">Kontakt</a>
  </div>
</nav>

<!-- PLACEHOLDER CONTENT (kannst du später füllen) -->
<main>

</main>

<!-- FOOTER / KONTAKT -->
<section id="kontakt">

  <h2>Kontakt</h2>

  <div class="socials">

    <a href="mailto:ellyfleschutz@web.de">E-Mail</a>

    <a href="https://instagram.com/ellyfleschutz" target="_blank">
      Instagram
    </a>

  </div>

</section>

</div>

</body>
</html>
